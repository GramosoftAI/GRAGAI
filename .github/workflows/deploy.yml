name: Secure GraphMind Deployment

on:
  push:
    branches:
      - backdev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Application
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/deploy/graphmind
            chmod +x deploy.sh
            ./deploy.sh
